workflows:
  ios-workflow:
    name: iOS Signed Build
    max_build_duration: 60
    integrations:
      app_store_connect: Prompt Hero
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Set up keychain
        script: keychain initialize

      - name: Generate private key and import to keychain
        script: |
          # Generate RSA private key
          openssl genrsa -out /tmp/cert_key.pem 2048

          # Import key into keychain so Codemagic can pair it with the certificate
          security import /tmp/cert_key.pem \
            -k ~/Library/Keychains/codemagic.keychain \
            -T /usr/bin/codesign

          # Allow codesign to access the key without prompts
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -k "" \
            ~/Library/Keychains/codemagic.keychain

      - name: Create iOS Distribution certificate from CSR
        script: |
          # Create a CSR using the private key we just generated
          openssl req -new \
            -key /tmp/cert_key.pem \
            -out /tmp/cert.csr \
            -subj "/CN=iOS Distribution/O=Prompt Hero/C=US"

          # Submit CSR to Apple — creates a new certificate
          app-store-connect create-certificate \
            --type IOS_DISTRIBUTION \
            --csr-path /tmp/cert.csr

      - name: Fetch provisioning profile from App Store Connect
        script: |
          app-store-connect fetch-signing-files com.ideas.prompthero \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles

      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter build iOS
        script: flutter build ios --release

      - name: Archive and export IPA
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist /dev/stdin <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - flutter_drive.log
