workflows:
  ios-workflow:
    name: iOS Signed Build
    max_build_duration: 60
    integrations:
      app_store_connect: Prompt Hero
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ideas.prompthero
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.ideas.prompthero \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter build iOS
        script: |
          flutter build ios --release
      - name: Build and export IPA
        script: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            -exportOptionsPlist /dev/stdin \
            -exportPath "$CM_BUILD_DIR/ipa" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - flutter_drive.log
    publishing:
      app_store_connect:
        api_key: Prompt Hero
        submit_to_testflight: true
