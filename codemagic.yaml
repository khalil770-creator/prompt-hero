workflows:
  ios-workflow:
    name: iOS Signed Build
    max_build_duration: 60
    integrations:
      app_store_connect: Prompt Hero
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios-signing
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files and create certificate
        script: |
          app-store-connect fetch-signing-files com.ideas.prompthero \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles

      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Resolve SPM packages and patch cloud_firestore Pipeline bug
        script: |
          # Pre-resolve SPM packages so we can patch before compilation
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath "$(pwd)/build/ios/SourcePackages"

          # Patch FLTPipelineParser.m which references missing firebase-ios-sdk APIs
          PIPELINE_FILE=$(find "$(pwd)/build/ios/SourcePackages" -name "FLTPipelineParser.m" 2>/dev/null | head -1)
          if [ -n "$PIPELINE_FILE" ]; then
            echo "Patching: $PIPELINE_FILE"
            export PIPELINE_FILE
            python3 -c "
import re, os
path = os.environ['PIPELINE_FILE']
with open(path) as f:
    content = f.read()
content = re.sub(r'\[\[FIRCollectionSourceStageBridge alloc\] initWithRef:[^\n]+', 'nil', content)
content = re.sub(r'\[\[FIRCollectionGroupSourceStageBridge alloc\] initWithCollectionId:[^\n]+', 'nil', content)
with open(path, 'w') as f:
    f.write(content)
print('Patch applied to:', path)
"
          else
            echo "FLTPipelineParser.m not found — skipping patch"
          fi

      - name: Flutter build iOS
        script: flutter build ios --release

      - name: Create export options plist
        script: |
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)
          echo "Using profile: $PROFILE_NAME | Team: $TEAM_ID"
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ideas.prompthero</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive and export IPA
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
