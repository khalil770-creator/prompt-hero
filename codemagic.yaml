workflows:
  ios-workflow:
    name: iOS Signed Build
    max_build_duration: 60
    integrations:
      app_store_connect: Prompt Hero
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Set up keychain
        script: keychain initialize

      - name: Generate private key
        script: openssl genrsa -out /tmp/cert_key.pem 2048

      - name: Fetch signing files and create certificate
        script: |
          app-store-connect fetch-signing-files com.ideas.prompthero \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles

      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter build iOS
        script: flutter build ios --release

      - name: Archive and export IPA
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist /dev/stdin <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - flutter_drive.log
