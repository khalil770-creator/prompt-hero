workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign
      - name: Build archive (no codesign)
        script: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/Runner.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Package unsigned IPA
        script: |
          mkdir -p "$CM_BUILD_DIR/ipa/Payload"
          cp -r "$CM_BUILD_DIR/Runner.xcarchive/Products/Applications/Runner.app" \
            "$CM_BUILD_DIR/ipa/Payload/Runner.app"
          cd "$CM_BUILD_DIR/ipa"
          zip -r Runner.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/ipa/Runner.ipa
      - flutter_drive.log
