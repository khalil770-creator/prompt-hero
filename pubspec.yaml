name: prompt_vault
description: A curated library of top Claude AI prompts, organized by category.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^17.2.3

  # UI
  google_fonts: ^8.1.0
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Sharing
  share_plus: ^13.1.0
  url_launcher: ^6.3.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#4F46E5"
    theme_color: "#4F46E5"
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
